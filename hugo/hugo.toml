baseURL        = "http://localhost:1313/"
title          = "ISS 2026 - Cargo Service"
locale         = "it-IT"
theme          = "chicago7"
enableEmoji    = true

pagination.pagerSize = 10

[permalinks]
posts = "/posts/:year:month:day"

[markup]
  [markup.goldmark.renderer]
    unsafe = true # raw HTML in markdown

  [markup.highlight]
    style = "bw"

  [markup.tableOfContents]
    startLevel = 1
    endLevel   = 4
    ordered    = false

# Navigation menu
#[menu]
#[[menu.header]]
#name   = "Sprint0"
#url    = "sprint0"
#weight = 10
#
#[[menu.header]]
#name   = "Sprint1"
#url    = "sprint1"
#weight = 20

# Site parameters
[params]
# Relative path to logo inside static/
logo = "logo.svg"

# Author shown in footer copyright
author = "Leonardo Barone, Leonardo Ciacco"

# Shown in meta description on the home page
subtitle = "Ingegneria dei Sistemi Software 2026 - Cargo Service"

# SEO keywords (fallback when a page has none)
keywords = "ISS, cargo service, sistemi software, unibo"

# Custom 404 message
missingContentMessage = "Pagina non trovata."

# Set to true to enable KaTeX math rendering on every page.
# Set to false (or omit) to enable it only on pages with `math = true` in front matter.
math = true

# Social links shown in the footer (remove lines you don't want)
[params.social]
github = "https://github.com/"
